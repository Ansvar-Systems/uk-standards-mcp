name: Socket Security
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  socket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Socket Security Review
        uses: SocketDev/socket-security-action@v1
        with:
          enable_npm: true
