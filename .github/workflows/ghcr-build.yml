name: GHCR Build
on:
  push:
    branches: [main, master]
    tags: ['v*']
permissions:
  packages: write
  contents: read
jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/ansvar-systems/uk-standards-mcp:latest
            ghcr.io/ansvar-systems/uk-standards-mcp:${{ github.sha }}
