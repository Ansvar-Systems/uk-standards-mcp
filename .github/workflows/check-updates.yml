name: Check Updates
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run freshness:check
      - name: Create issue if stale
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.existsSync('.freshness-report') ? fs.readFileSync('.freshness-report', 'utf8') : 'Freshness check failed';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Data freshness: sources overdue',
              body: report,
              labels: ['data-freshness']
            });
